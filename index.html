<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APSA - All-Around Personal Schedule Assistant</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <h1>APSA</h1>
                    <span class="nav-subtitle">All-Around Personal Schedule Assistant</span>
                </div>
                <div class="nav-links">
                    <div id="nav-datetime" class="nav-datetime">--</div>
                    <a href="#/" class="nav-link" data-route="/">看板</a>
                    <a href="#/tasks" class="nav-link" data-route="/tasks">管理</a>
                    <a href="#/reports" class="nav-link" data-route="/reports">复盘</a>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <div id="page-container"></div>
        </main>

        <!-- 计时器模态框 -->
        <div id="timer-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="timer-task-title">任务标题</h2>
                    <button class="modal-close" onclick="closeTimerModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <!-- 计时器阶段 -->
                    <div id="timer-stage">
                        <div class="timer-display">
                            <div class="timer-time" id="timer-display">00:00:00</div>
                            <div class="timer-controls">
                                <button id="timer-start" class="btn btn-primary" onclick="startTimer()">开始</button>
                                <button id="timer-pause" class="btn btn-secondary" onclick="pauseTimer()" style="display:none;">暂停</button>
                                <button id="timer-resume" class="btn btn-primary" onclick="resumeTimer()" style="display:none;">继续</button>
                                <button id="timer-stop" class="btn btn-danger" onclick="stopTimer()" style="display:none;">停止</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 进度设置阶段（仅普通任务，停止计时后显示） -->
                    <div id="progress-stage" style="display:none;">
                        <div class="form-group">
                            <label>设置任务进度 (%):</label>
                            <div style="margin-bottom:0.5rem;">
                                <input type="range" id="timer-progress" min="0" max="100" value="0" class="form-control" style="width:100%;" oninput="updateProgressDisplay(this.value)">
                                <div style="display:flex; justify-content:space-between; margin-top:0.25rem;">
                                    <span style="font-size:0.85rem; color:var(--text-secondary);">0%</span>
                                    <span id="progress-display" style="font-size:0.9rem; font-weight:bold;">0%</span>
                                    <span style="font-size:0.85rem; color:var(--text-secondary);">100%</span>
                                </div>
                            </div>
                            <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                                <button class="btn btn-sm btn-secondary" onclick="setProgress(25)">25%</button>
                                <button class="btn btn-sm btn-secondary" onclick="setProgress(50)">50%</button>
                                <button class="btn btn-sm btn-secondary" onclick="setProgress(75)">75%</button>
                                <button class="btn btn-sm btn-secondary" onclick="setProgress(100)">100%</button>
                            </div>
                        </div>
                        <div style="margin-top:1.5rem;">
                            <button class="btn btn-primary" onclick="confirmProgress()">确认进度</button>
                            <button class="btn btn-secondary" onclick="cancelProgress()" style="margin-left:0.5rem;">取消</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 进度模态框（日常任务/事件） -->
        <div id="progress-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="progress-task-title">任务标题</h2>
                    <button class="modal-close" onclick="closeProgressModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>花费时间（分钟）:</label>
                        <input type="number" id="progress-time-spent" min="0" value="0" class="form-control">
                    </div>
                    <button class="btn btn-primary" onclick="completeProgressTask()">完成任务</button>
                </div>
            </div>
        </div>

    </div>

    <!-- 工具函数 -->
    <script src="utils.js"></script>
    <!-- 统计模块 -->
    <script src="stats.js"></script>
    <!-- 路由系统 -->
    <script src="router.js"></script>
    
    <!-- 业务逻辑模块 -->
    <script src="modules/taskTree.js"></script>
    <script src="modules/timer.js"></script>
    <script src="modules/rewards.js"></script>
    <script src="modules/history.js"></script>
    <script src="modules/schedule.js"></script>
    <script src="modules/upcomingEvents.js"></script>
    <script src="modules/radarChart.js"></script>
    <script src="modules/midTermGoals.js"></script>
    <script src="modules/noteBoard.js"></script>
    <script src="modules/dailyReview.js"></script>
    
    <!-- 页面模块 -->
    <script src="pages/dashboard.js"></script>
    <script src="pages/tasks.js"></script>
    <script src="pages/taskTree.js"></script>
    <script src="pages/reports.js"></script>
    <script src="pages/schedule.js"></script>
    <script src="pages/upcomingEvents.js"></script>
    <script src="pages/settings.js"></script>
    
    <!-- 应用初始化 -->
    <script src="app.js"></script>
    <!-- 立即初始化日期时间 -->
    <script>
        (function() {
            function updateDateTime() {
                const el = document.getElementById('nav-datetime');
                if (el) {
                    const now = new Date();
                    const year = now.getFullYear();
                    const month = String(now.getMonth() + 1).padStart(2, '0');
                    const day = String(now.getDate()).padStart(2, '0');
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                    const weekday = weekdays[now.getDay()];
                    el.textContent = `${year}-${month}-${day} 星期${weekday} ${hours}:${minutes}:${seconds}`;
                }
            }
            // 立即执行一次
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateDateTime);
            } else {
                updateDateTime();
            }
            // 每秒更新
            setInterval(updateDateTime, 1000);
        })();
    </script>
</body>
</html>
